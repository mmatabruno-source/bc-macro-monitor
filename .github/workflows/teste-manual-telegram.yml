name: Teste manual — exemplos de mensagem Telegram (Focus)

on:
  workflow_dispatch: {}

jobs:
  enviar-exemplos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Enviar os 3 cenários de exemplo ao Telegram
        env:
          FOCUS_TELEGRAM_BOT_TOKEN: ${{ secrets.FOCUS_TELEGRAM_BOT_TOKEN }}
          FOCUS_TELEGRAM_CHAT_ID: ${{ secrets.FOCUS_TELEGRAM_CHAT_ID }}
        run: python scripts/enviar_exemplos_telegram.py
