name: Monitor Macro do BC

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  checar-fluxos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: "[TEMP] Enviar 3 cenários de exemplo (corte/manutenção/alta)"
        env:
          FOCUS_TELEGRAM_BOT_TOKEN: ${{ secrets.FOCUS_TELEGRAM_BOT_TOKEN }}
          FOCUS_TELEGRAM_CHAT_ID: ${{ secrets.FOCUS_TELEGRAM_CHAT_ID }}
        run: python -m scripts.enviar_exemplos_telegram

      - name: Rodar monitor (todos os fluxos, isolados entre si)
        env:
          FOCUS_TELEGRAM_BOT_TOKEN: ${{ secrets.FOCUS_TELEGRAM_BOT_TOKEN }}
          FOCUS_TELEGRAM_CHAT_ID: ${{ secrets.FOCUS_TELEGRAM_CHAT_ID }}
          IPCA_TELEGRAM_BOT_TOKEN: ${{ secrets.IPCA_TELEGRAM_BOT_TOKEN }}
          IPCA_TELEGRAM_CHAT_ID: ${{ secrets.IPCA_TELEGRAM_CHAT_ID }}
          RELATORIO_TELEGRAM_BOT_TOKEN: ${{ secrets.RELATORIO_TELEGRAM_BOT_TOKEN }}
          RELATORIO_TELEGRAM_CHAT_ID: ${{ secrets.RELATORIO_TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.main

      - name: Commitar estado e histórico atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add estado.json historico/
          git diff --cached --quiet || git commit -m "chore: atualizar estado dos fluxos [skip ci]"
          git push
